<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parcours d'accueil — LP Jacques Raynaud — Campus ÉQUATIO</title>
<style>
:root{--bi:#1b3a63;--bv:#2563eb;--bc:#3b82f6;--bp:#EFF3FB;--or:#ff6b35;--ov:#ff5722;--oc:#FFF4ED;--cy:#06b6d4;--cc:#22d3ee;--cl:#E0F7FA;--vt:#10b981;--vc:#ECFDF5;--vi:#8b5cf6;--vc2:#F3F0FF;--ja:#fbbf24;--rk:#ef4444;--rc:#FEF2F2;--gt:#1e293b;--gtl:#64748b;--gc:#f0f4f8;--w:#fff;--r:12px;--sh:0 4px 20px rgba(27,58,99,.12);--shh:0 8px 40px rgba(27,58,99,.18);--sho:0 4px 20px rgba(255,107,53,.25);--ft:'Fredoka','Nunito',sans-serif;--fc:'Nunito','Segoe UI',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fc);font-size:16px;line-height:1.6;color:var(--gt);background:var(--gc);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1b3a63 0%,#2563eb 50%,#06b6d4 100%);color:var(--w);padding:18px 20px 14px;text-align:center}
.hdr-logos{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.hdr-logos svg{max-width:100%;height:auto}
.hdr-sep{width:1px;height:46px;background:rgba(255,255,255,.25);flex-shrink:0}
.hdr-sub{font-family:var(--fc);font-size:.92em;font-style:italic;opacity:.8;margin-top:8px}
.hdr-bar{height:5px;background:linear-gradient(90deg,var(--or),var(--ja),var(--vt),var(--cy),var(--bv),var(--vi))}
.ctn{max-width:800px;margin:0 auto;padding:24px 16px}
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:28px 24px;margin-bottom:20px;border:1px solid rgba(27,58,99,.06);transition:box-shadow .3s,transform .3s;animation:fadeUp .4s ease both}
.card:hover{box-shadow:var(--shh)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card h2{font-family:var(--ft);color:var(--bi);font-size:1.3em;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:3px solid var(--cy)}
.card h3{color:var(--bc);font-size:1.05em;margin:16px 0 8px}
.fg{margin-bottom:16px}
.fg label{display:block;font-weight:600;color:var(--bi);margin-bottom:4px;font-size:.9em}
.fg input,.fg select{width:100%;padding:10px 14px;border:2px solid var(--bp);border-radius:var(--r);font-size:1em;font-family:var(--fc);transition:border-color .2s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--bc);box-shadow:0 0 0 3px rgba(44,74,124,.1)}
.btn{display:inline-block;padding:14px 32px;border:none;border-radius:var(--r);font-family:var(--fc);font-size:1em;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.btn-p{background:var(--bv);color:var(--w)}.btn-p:hover{background:var(--bc);box-shadow:0 4px 16px rgba(37,99,235,.35)}.btn-p:disabled{background:#999;cursor:not-allowed}
.btn-s{background:var(--vt);color:var(--w)}.btn-s:hover{background:#059669;box-shadow:0 4px 16px rgba(16,185,129,.35)}
.btn-o{background:transparent;color:var(--bv);border:2px solid var(--bv)}.btn-o:hover{background:var(--bp);border-color:var(--bc)}
.btn-pr{background:var(--or);color:var(--w)}.btn-pr:hover{background:var(--ov);box-shadow:var(--sho)}
.btn-bk{display:block;width:100%}
.pl{display:flex;flex-direction:column;gap:12px}
.pi{display:flex;align-items:center;gap:16px;padding:16px 18px;border:2px solid var(--bp);border-radius:var(--r);transition:all .25s;cursor:pointer}
.pi:hover{border-color:var(--cy);background:var(--cl);transform:translateY(-2px);box-shadow:var(--sh)}
.pi.lk{opacity:.5;cursor:not-allowed}.pi.lk:hover{border-color:var(--bp);background:var(--w)}
.pi.dn{border-color:var(--vt);background:var(--vc)}
.pi.fl{border-color:var(--rk);background:var(--rc)}
.pn{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--bv),var(--cy));color:var(--w);display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-size:1.3em;font-weight:700;flex-shrink:0}
.pi.dn .pn{background:linear-gradient(135deg,var(--vt),#34d399)}.pi.fl .pn{background:linear-gradient(135deg,var(--rk),#f87171)}
.pinf{flex:1}.pinf h4{color:var(--bi);margin-bottom:2px}.pinf p{font-size:.85em;color:#666}
.pbg{font-size:.8em;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.bg-t{background:#DBEAFE;color:var(--bv)}.bg-o{background:var(--vc);color:#065F46}.bg-k{background:var(--rc);color:#991B1B}.bg-l{background:#eee;color:#999}
.pbw{background:var(--bp);border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
.pbf{height:100%;background:linear-gradient(90deg,var(--cy),var(--bv),var(--or));border-radius:20px;transition:width .4s ease}
.qc{text-align:center;font-size:.85em;color:#888;margin-bottom:12px}
.qt{font-size:1.15em;font-weight:700;color:var(--gt);margin-bottom:20px;line-height:1.5}
.ol{display:flex;flex-direction:column;gap:10px}
.ob{display:block;width:100%;text-align:left;padding:14px 18px;border:2px solid var(--bp);border-radius:var(--r);background:var(--w);font-family:var(--fc);font-size:.95em;color:var(--gt);cursor:pointer;transition:all .2s;line-height:1.4}
.ob:hover{border-color:var(--cy);background:var(--cl)}
.ob.sel{border-color:var(--bv);background:#EFF6FF;font-weight:700;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.ob.ok{border-color:var(--vt);background:var(--vc)}.ob.ko{border-color:var(--rk);background:var(--rc)}
.fb{margin-top:12px;padding:12px 16px;border-radius:var(--r);font-size:.9em;line-height:1.5}
.fb-ok{background:var(--vc);color:#065F46}.fb-ko{background:var(--rc);color:#991B1B}
.sd{text-align:center;padding:24px}
.sb{font-family:var(--ft);font-size:3.5em;font-weight:700;line-height:1;margin-bottom:8px}
.sp{color:var(--vt)}.sf{color:var(--rk)}
.sl{font-size:1.1em;color:#666}
.sz{border:2px dashed var(--cy);border-radius:var(--r);padding:8px;margin:16px 0;text-align:center}
.sz canvas{border:1px solid #ddd;border-radius:4px;cursor:crosshair;touch-action:none;max-width:100%}
.sa{margin-top:8px;display:flex;gap:8px;justify-content:center}
.bs{padding:6px 14px;font-size:.85em;border:1px solid #ccc;border-radius:4px;background:var(--w);cursor:pointer}
.bs:hover{background:#f0f0f0}
.cbg{display:flex;align-items:flex-start;gap:10px;padding:14px;background:var(--oc);border-radius:var(--r);border-left:4px solid var(--or);margin:12px 0;cursor:pointer}
.cbg input[type=checkbox]{margin-top:3px;width:18px;height:18px;flex-shrink:0;accent-color:var(--bv)}
.cbg label{font-size:.95em;line-height:1.5;cursor:pointer}
.rgpd{background:var(--bp);border-radius:var(--r);padding:14px 18px;font-size:.8em;color:var(--bc);margin-top:16px;line-height:1.6}
.rgpd strong{color:var(--bi)}
.tc{text-align:center}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.g8{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hid{display:none!important}
.dv{height:1px;background:var(--bp);margin:20px 0}
.tg{display:inline-block;background:var(--vc2);color:var(--vi);padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:600}
.adm{position:fixed;bottom:16px;right:16px;z-index:100}
@media print{
  body{background:#fff;font-size:11pt}
  .hdr,.hdr-bar,.np,.adm,.rgpd{display:none!important}
  .ctn{max-width:100%;padding:0;margin:0}.card{box-shadow:none;border:none;padding:0}
  .pa{display:block!important;page-break-inside:avoid;padding:20px 30px}
  .ph{text-align:center;border-bottom:3px double #1b3a63;padding-bottom:16px;margin-bottom:20px}
  .ph svg{margin:0 auto 6px;display:block}
  .ph .phs{font-size:9pt;color:#666;margin-top:4px}
  .pb{font-size:11pt;line-height:1.6}
  .pb h2{font-family:Georgia,serif;font-size:14pt;color:#1b3a63;text-align:center;margin:20px 0 16px;text-transform:uppercase;letter-spacing:1px}
  .ps{width:100%;border-collapse:collapse;margin:16px 0}
  .ps th,.ps td{border:1px solid #ccc;padding:8px 12px;text-align:left}
  .ps th{background:#e8edf4;color:#1b3a63;font-weight:600}
  .pe{border:1px solid #ccc;padding:16px;margin:16px 0;line-height:1.8}
  .psa{display:flex;justify-content:space-between;margin-top:30px;gap:40px}
  .psb{flex:1;text-align:center}.psb p{margin-bottom:8px;font-weight:600}
  .psi{max-height:80px;margin-top:4px}
  #att-card{display:none}
}
@media(max-width:600px){
  .hdr{padding:12px 12px 10px}.hdr-logos{gap:10px}.hdr-sep{height:32px}
  .ctn{padding:12px 10px}.card{padding:20px 16px}.pi{flex-wrap:wrap}.sb{font-size:2.5em}
}
</style>
</head>

<div class="hdr">
  <div class="hdr-logos">

<script>
var P=[
{id:1,titre:"Entrer au lycée professionnel",desc:"Comprendre le changement collège → lycée pro",duree:"10-15 min",seuil:12,icon:"🏫",q:[
["Quelle est la principale différence entre le collège et le lycée professionnel ?","On a enfin le droit de dormir en cours","On prépare un diplôme et un métier","Les profs sont plus sympas","On peut utiliser son téléphone",1,"Le lycée professionnel vous prépare à un métier reconnu par un diplôme national. C'est un engagement sérieux vers votre avenir professionnel."],
["Au lycée professionnel, la ponctualité est :","Optionnelle si on a une bonne excuse","Importante seulement pour les contrôles","Une obligation quotidienne, comme en entreprise","Réservée aux premiers de la classe",2,"En entreprise, un salarié en retard peut être sanctionné. Au lycée pro, on vous prépare à cette exigence. La ponctualité n'est pas une option."],
["Un élève en retard sans justificatif :","Peut entrer tranquillement, personne ne remarque","Sera exclu définitivement du lycée","S'expose à des sanctions progressives","Attend la récré pour entrer discrètement",2,"Les retards sont comptabilisés. Des retards répétés sans justificatif entraînent des sanctions progressives : avertissement, retenue, convocation des familles."],
["Le respect des adultes dans l'établissement concerne :","Uniquement votre prof principal","Les profs que vous aimez bien","Tous les personnels : enseignants, vie scolaire, agents, administration","Ceux qui vous ont vu en premier",2,"TOUS les adultes de l'établissement ont autorité sur TOUS les élèves. Un agent d'entretien qui vous demande de ne pas courir a la même autorité qu'un professeur."],
["Le téléphone portable au lycée :","Est autorisé si on met le son en silencieux","Est interdit sauf aux récréations dans les zones autorisées","Peut servir de calculatrice en cours","Est obligatoire pour suivre les cours",1,"Le téléphone doit être éteint et rangé en cours, en atelier et dans les couloirs. Seule exception : autorisation explicite du professeur dans un cadre pédagogique."],
["Porter une tenue adaptée signifie :","Venir en claquettes-chaussettes, c'est la mode","Porter une tenue correcte, compatible avec les ateliers","Porter un costume trois pièces","Mettre son plus beau survêtement",1,"La tenue doit être correcte, respectueuse et adaptée aux activités, notamment en atelier où des EPI sont obligatoires. Les tenues incompatibles avec la sécurité sont refusées."],
["Que signifie « lycée professionnel » ?","Un lycée où on ne fait que de la pratique","Un établissement qui forme à un métier tout en donnant une culture générale","Un lycée pour ceux qui n'aiment pas l'école","Un lycée réservé aux adultes",1,"Le lycée professionnel combine enseignement général (français, maths, histoire) et enseignement professionnel (atelier, technologie, stages). Les deux sont indispensables pour le diplôme."],
["En cas d'absence, qui prévient l'établissement ?","Votre meilleur ami par SMS","Personne, l'absence se justifie toute seule","Le responsable légal, dans les plus brefs délais","Votre petit frère avec un mot signé",2,"Le responsable légal doit prévenir l'établissement le jour même et fournir un justificatif écrit via École Directe ou le carnet dans les 48h."],
["L'atelier est un lieu :","De détente pour souffler entre deux cours de maths","D'apprentissage professionnel avec des règles de sécurité strictes","Où on peut enfin faire ce qu'on veut","Réservé aux terminales qui ont le droit",1,"L'atelier est un lieu de travail professionnel. Les règles de sécurité y sont les mêmes que dans une entreprise. Les manquements sont sanctionnés immédiatement."],
["Les règles du lycée professionnel existent pour :","Vous empêcher de vivre votre meilleure vie","Occuper les CPE qui s'ennuient","Préparer aux exigences du monde professionnel","Punir les élèves qui rigolent",2,"Chaque règle du lycée pro a un équivalent en entreprise. Ponctualité, tenue, respect, sécurité : ce que vous apprenez ici, vous le vivrez en stage et dans votre métier."],
["Un élève inscrit s'engage à :","Venir quand le temps est agréable","Respecter le règlement intérieur et les consignes de sécurité","Ne suivre que les cours qui l'intéressent","Négocier ses propres horaires",1,"L'inscription vaut engagement. Vous avez signé (ou vos parents) un contrat de respect du règlement intérieur. C'est un engagement moral et juridique."],
["Mâcher un chewing-gum en cours est :","Autorisé si on fait des bulles discrètes","Interdit","Autorisé seulement en atelier","Recommandé pour la concentration",1,"Le chewing-gum est interdit en cours et en atelier. En atelier, c'est aussi un risque d'étouffement en cas de surprise ou d'accident."],
["École Directe sert à :","Stalker les notes de ses camarades","Assurer le lien entre l'établissement, l'élève et la famille","Jouer à des jeux éducatifs","Rien, personne ne l'utilise",1,"École Directe est l'outil officiel de suivi scolaire. Notes, absences, retards, cahier de textes, bulletins : tout y est. Consultez-le régulièrement avec vos parents."],
["Si un élève ne respecte pas les règles :","Rien, on lui donne des chances à l'infini","Sanctions proportionnées, pouvant aller jusqu'à l'exclusion","On appelle directement la police","On fait voter la classe",1,"Les sanctions sont progressives et proportionnées : avertissement oral, avertissement écrit, retenue, exclusion temporaire, conseil de discipline. Chaque étape est documentée."],
["Entrer au lycée professionnel, c'est avant tout :","Continuer le collège avec la récré en plus","S'engager dans une formation menant à un diplôme et à un métier","Attendre 16 ans pour arrêter","Une punition de l'orientation",1,"Vous n'êtes pas là par hasard. Le lycée pro mène à un CAP, un Bac Pro ou un BTS — des diplômes reconnus qui ouvrent directement sur l'emploi. C'est un choix d'avenir."]
]},
{id:2,titre:"Règles de vie et règlement intérieur",desc:"Connaître le cadre quotidien",duree:"20-25 min",seuil:24,icon:"📋",q:[
["Des retards répétés injustifiés entraînent :","Un simple rappel oral et on n'en parle plus","Des sanctions progressives incluant des retenues","Un abonnement gratuit au bus","Une discussion informelle à la cantine",1,"Les retards sont comptabilisés dans École Directe. Au bout de 3 retards injustifiés : retenue. Au-delà : convocation des parents. En entreprise, c'est un motif de licenciement."],
["Pour justifier une absence, le responsable légal doit :","Envoyer un emoji sur WhatsApp","Fournir un justificatif via École Directe ou le carnet dans les 48h","Ne rien faire, ça s'arrange tout seul","Écrire un mot sur une serviette en papier",1,"Délai de 48h maximum. Au-delà, l'absence est considérée comme injustifiée. Les absences injustifiées répétées sont signalées à l'inspection académique."],
["École Directe est :","Le nouveau réseau social à la mode","Le logiciel officiel de suivi scolaire : notes, absences, cahier de textes","Un jeu vidéo éducatif","Une application de livraison de devoirs",1,"École Directe est l'outil officiel de l'établissement. Vous et vos parents devez le consulter régulièrement. C'est là que tout est tracé."],
["La casquette ou capuche est autorisée :","Partout, c'est un droit fondamental","Uniquement dans la cour, selon les consignes","En cours si ça va avec la tenue","Sur la photo de classe",1,"Casquette, capuche et bonnet doivent être retirés en entrant dans un bâtiment (cours, couloirs, CDI, administration). C'est une règle de politesse et de respect."],
["En cours, vous avez soif. Vous pouvez boire :","Votre canette de Coca, discrètement sous la table","Un jus d'orange, c'est du fruit c'est sain","De l'eau uniquement, dans une gourde ou une bouteille","Un energy drink pour rester concentré",2,"Seule l'eau est autorisée en cours. Pas de sodas, jus, energy drinks. Manger est également interdit. C'est une règle d'hygiène et de respect de l'espace de travail commun."],
["Le cyberharcèlement (insultes, menaces en ligne) est :","Une blague entre potes qui ne sort pas du téléphone","Un délit puni par la loi, avec sanctions scolaires et judiciaires","Toléré si ça reste sur Snapchat","Un problème qui ne concerne pas le lycée",1,"Le cyberharcèlement est un délit pénal (jusqu'à 3 ans de prison et 45 000€ d'amende). Le lycée signale systématiquement les faits au procureur. Les captures d'écran sont des preuves."],
["Publier une photo d'un camarade sans son accord est :","Normal, tout le monde fait ça","Interdit : atteinte au droit à l'image","Autorisé si on met un filtre rigolo","OK si c'est juste en story 24h",1,"Le droit à l'image est protégé par la loi. Photographier, filmer ou diffuser l'image de quelqu'un sans son consentement est une infraction. Même dans l'enceinte du lycée."],
["La laïcité au lycée signifie :","Que toutes les religions sont interdites","Que l'école est un espace neutre, chacun respecte les convictions des autres","Qu'on ne peut pas parler de religion du tout","Qu'une seule religion est acceptée",1,"La laïcité garantit la liberté de conscience. En revanche, les signes religieux ostensibles sont interdits par la loi du 15 mars 2004. Le prosélytisme est interdit."],
["Le port de signes religieux ostentatoires au lycée est :","Autorisé si c'est discret","Autorisé le vendredi seulement","Interdit par la loi du 15 mars 2004","Un choix personnel sans limite",2,"La loi du 15 mars 2004 interdit le port de signes religieux ostensibles dans les établissements scolaires publics. Les établissements privés sous contrat appliquent également cette règle dans le cadre du règlement intérieur."],
["Les sanctions au lycée sont :","Tirées au sort par la CPE","Proportionnées à la faute et respectent une procédure","Toujours les mêmes pour tout le monde","Votées par les élèves délégués",1,"Les sanctions suivent un barème progressif et respectent le principe de proportionnalité. L'élève a le droit de s'expliquer. La procédure est encadrée par le Code de l'éducation."],
["Un professeur que vous ne connaissez pas vous demande de ranger votre téléphone. Vous :","Répondez « Vous êtes pas mon prof » et continuez","L'ignorez parce qu'il ne connaît pas votre nom","Obéissez : tout adulte de l'établissement a autorité sur tout élève","Lui demandez sa carte professionnelle",2,"Tous les personnels de l'établissement — enseignants, agents, CPE, administration — ont autorité sur tous les élèves. C'est le règlement intérieur. Refuser = faute grave."],
["Votre camarade sort un marqueur pour taguer une table. Vous :","Riglez et ajoutez votre prénom à côté","Prenez une photo pour les réseaux, c'est drôle","Signalez la dégradation au professeur sans en rajouter","Ne dites rien, c'est pas votre problème",2,"Toute dégradation de matériel engage la responsabilité financière de la famille. Le mobilier du lycée appartient à la collectivité. Détruire un bien commun, c'est voler tout le monde."],
["Les infos diffusées via École Directe :","Sont de la publicité, on peut ignorer","Doivent être consultées régulièrement par l'élève et sa famille","Ne concernent que les parents stressés","Arrivent par télépathie, pas besoin de lire",1,"École Directe est le canal officiel. Notes, convocations, informations de rentrée, bulletins : si c'est sur ED, c'est officiel. Ne pas lire n'est pas une excuse."],
["Un élève a le droit de :","Refuser un cours qui ne lui plaît pas","S'exprimer dans le respect des règles et des personnes","Insulter un prof si celui-ci est injuste","Quitter l'établissement quand il veut",1,"La liberté d'expression des élèves existe mais dans le cadre du respect. Vous pouvez contester, questionner, mais jamais insulter, menacer ou perturber."],
["Le vol ou le racket dans l'établissement :","C'est des histoires entre élèves, pas grave","Ce sont des délits : sanctions disciplinaires ET poursuites judiciaires","Ne sont punis que si un adulte est témoin","Sont tolérés pour de petits objets",1,"Le vol et le racket sont des délits pénaux quel que soit l'âge. Le lycée porte plainte systématiquement. Un mineur peut être poursuivi dès 13 ans."],
["Fumer (cigarette ou électronique) dans l'enceinte est :","Autorisé dans la cour, c'est dehors","Interdit dans l'ensemble de l'enceinte de l'établissement","Toléré si on est majeur","OK si c'est une cigarette électronique",1,"La loi Évin interdit de fumer dans tout l'établissement, y compris la cour et les abords. La cigarette électronique est soumise aux mêmes règles. Infraction = sanction disciplinaire."],
["Vous arrivez en scooter au lycée. Dans l'enceinte, vous :","Faites vrombir le moteur pour impressionner les copains","Roulez doucement, c'est pareil","Coupez le moteur et poussez votre scooter jusqu'au parking","Faites un petit wheeling d'entrée, c'est la tradition",2,"Tout véhicule à moteur doit être poussé moteur éteint dans l'enceinte. C'est une question de sécurité pour tous les piétons. Infraction = interdiction de stationner dans l'établissement."],
["Votre casque de scooter, vous le rangez :","Sur votre tête toute la journée, on sait jamais","Sur l'établi en atelier, c'est pratique","Dans votre casier ou l'espace prévu, pas en classe ni en atelier","Comme ballon de foot à la récré",2,"Le casque ne doit pas encombrer les salles de cours ni les ateliers (risque de chute). Rangez-le dans votre casier ou l'espace dédié."],
["Votre trottinette électrique pour venir au lycée :","N'a pas besoin d'assurance, c'est pas un véhicule","Doit être assurée en responsabilité civile, c'est obligatoire","Est autorisée dans les couloirs","Peut rouler sur le trottoir à 25 km/h sans souci",1,"Depuis 2019, les trottinettes électriques doivent être assurées (responsabilité civile minimum). Rouler sans assurance = amende de 3 750€. Le lycée peut demander l'attestation."],
["L'assurance scolaire est :","Inutile, le lycée est responsable de tout","Fortement recommandée, obligatoire pour les sorties et stages","Un truc que les parents paient pour rien","Uniquement nécessaire en atelier",1,"L'assurance scolaire couvre votre enfant en cas d'accident. Elle est obligatoire pour toute activité hors établissement (sorties, stages PFMP). Vérifiez qu'elle est à jour."],
["Le respect entre élèves signifie :","Être poli uniquement devant les adultes","Accepter les différences, ne pas discriminer, ne pas harceler","Être d'accord avec tout le monde sur tout","Ignorer les autres pour éviter les problèmes",1,"Le respect, c'est au quotidien : pas de moqueries, pas de discriminations (origine, physique, orientation, handicap). Le harcèlement commence dès que la victime souffre, même si l'auteur « rigole »."],
["Les sorties de l'établissement pendant les heures de cours :","Sont libres pour tous, c'est pas une prison","Sont encadrées par le règlement et nécessitent une autorisation","Sont possibles si un pote vous couvre","Ne concernent que les internes",1,"Les sorties sont réglementées. Sans autorisation parentale sur le dossier, aucun élève mineur ne peut quitter l'établissement en dehors des horaires prévus."],
["Introduire alcool ou stupéfiants au lycée :","C'est interdit et c'est une faute grave","C'est toléré en petite quantité","Ça ne concerne que les majeurs","C'est puni que si on se fait prendre",0,"L'introduction, la détention et la consommation d'alcool ou de stupéfiants sont des fautes graves entraînant une procédure disciplinaire et un signalement judiciaire. C'est la loi."],
["Le matériel du lycée (tables, chaises, outils, manuels) :","Appartient à personne, on peut en faire ce qu'on veut","Est remplacé automatiquement si on le casse","Appartient à la collectivité : toute dégradation est facturée à la famille","Est de mauvaise qualité donc c'est pas grave",2,"Le matériel est financé par les familles, les collectivités et l'État. Toute dégradation volontaire est facturée aux responsables légaux en plus des sanctions disciplinaires."],
["Quelqu'un vous insulte dans le couloir. Vous :","Répondez par une insulte encore plus forte","Le frappez, c'est de la légitime défense","En parlez à un adulte : CPE, professeur, infirmier","Publiez son nom sur les réseaux pour le dénoncer",2,"Face à une agression verbale, alertez un adulte. Se faire justice soi-même (violence, représailles en ligne) vous met en tort aussi. Les adultes sont là pour régler les conflits."],
["Manger en classe (chips, bonbons, sandwich) est :","Autorisé si on partage avec le prof","Interdit : on mange à la cantine ou pendant les pauses","Toléré si on ne fait pas de miettes","Autorisé le vendredi parce que c'est bientôt le week-end",1,"Manger en cours est interdit. Les repas se prennent à la cantine ou aux espaces prévus pendant les pauses. L'hygiène de la salle de cours est l'affaire de tous."],
["Votre tenue vestimentaire au lycée doit être :","La plus originale possible pour se démarquer","Correcte, décente et adaptée à un lieu d'enseignement et aux ateliers","Identique à celle de vos influenceurs préférés","Sans importance, on juge pas les gens sur leur look",1,"Le lycée est un lieu de formation professionnelle. La tenue doit être correcte et compatible avec les activités, notamment l'atelier. Les tenues provocantes ou les sous-vêtements visibles ne sont pas acceptés."],
["Pendant une sortie scolaire, vous représentez :","Vous-même et personne d'autre","Le lycée Jacques Raynaud : votre comportement engage l'établissement","Votre marque de vêtements préférée","Votre équipe de foot",1,"En sortie, vous êtes sous la responsabilité du lycée et vous le représentez. Un mauvais comportement peut entraîner des sanctions au retour ET compromettre les sorties futures pour toute la classe."],
["Un camarade est victime de discrimination (origine, physique, orientation). Vous :","Riglez, c'est juste une blague","Filmez la scène pour les réseaux","En parlez à un adulte de confiance : la discrimination est interdite par la loi","Ne dites rien, c'est pas votre problème",2,"La discrimination est un délit pénal. Le lycée a l'obligation de protéger chaque élève. Signaler n'est pas « balancer » : c'est protéger. Des dispositifs existent : CPE, infirmier, numéro 3020."],
["Le CDI (Centre de Documentation et d'Information) est un lieu :","Pour dormir au calme entre deux cours","De travail, de recherche et de lecture, dans le calme","Pour recharger son téléphone","Réservé aux profs et aux premiers de la classe",1,"Le CDI est ouvert à tous les élèves. C'est un espace de travail calme : pas de bruit, pas de nourriture, pas de téléphone. Le documentaliste vous aide dans vos recherches."]
]},
{id:3,titre:"Sécurité, comportement et posture professionnelle",desc:"Maîtriser sécurité et posture en milieu professionnel",duree:"25-30 min",seuil:32,icon:"⚠️",q:[
["Les EPI (Équipements de Protection Individuelle) en atelier sont :","Facultatifs si on fait attention","Obligatoires dès l'entrée en zone de travail","Un accessoire de mode professionnel","Réservés aux journées portes ouvertes",1,"Les EPI sont OBLIGATOIRES. Pas de chaussures de sécurité = pas d'atelier. Pas de lunettes = pas de meulage. C'est la loi (Code du travail) et le règlement. Non négociable."],
["Les chaussures de sécurité doivent être :","Des baskets propres, ça fait l'affaire","Des chaussures à coque conformes aux normes EN ISO 20345","Des tongs en été, il fait chaud en atelier","Des mocassins en cuir, c'est classe",1,"Les chaussures de sécurité à coque protègent contre la chute d'objets lourds (bouteilles de fluide, outils). Norme EN ISO 20345 minimum. Le lycée vérifie la conformité."],
["Un électroportatif (perceuse, meuleuse) est posé sur l'établi. Vous :","Le prenez et appuyez sur la gâchette pour tester la batterie","Le montrez à un camarade en le branchant","N'y touchez pas tant que le professeur ne vous a pas autorisé","Le déplacez juste pour faire de la place, ça compte pas",2,"AUCUN électroportatif ne doit être touché, déplacé ou mis en route sans autorisation du professeur. Une meuleuse tourne à 11 000 tr/min. Manquement = exclusion immédiate de l'atelier."],
["La tronçonneuse à métaux est branchée. Le prof est occupé. Vous :","L'essayez vite pendant qu'il a le dos tourné","Demandez à un camarade de montrer comment ça marche","Attendez votre tour et l'autorisation du professeur, sans y toucher","Vérifiez si la lame tourne en appuyant sur le bouton",2,"Une tronçonneuse peut sectionner un doigt en une fraction de seconde. Un camarade n'est PAS habilité à vous former. Seul le professeur autorise et supervise. Manquement = exclusion immédiate."],
["Vous avez terminé un montage électrique. Vous :","Branchez et mettez sous tension pour voir si ça marche","Demandez à votre voisin s'il pense que c'est bon","Appelez le professeur pour qu'il vérifie et autorise la mise sous tension","Touchez les fils pour vérifier qu'ils sont bien serrés",2,"L'ÉLECTRICITÉ TUE. Aucune installation ne doit être mise sous tension sans vérification et autorisation du professeur. Un contact direct peut être mortel. Cette règle est absolue."],
["En cas d'alarme incendie :","Vous continuez votre travail en attendant que ça s'arrête","Vous évacuez calmement en suivant le plan et les consignes du professeur","Vous prenez vos affaires puis vous sortez tranquillement","Vous appelez vos parents pour les prévenir",1,"L'évacuation est immédiate, sans bagages, en suivant les itinéraires fléchés. Le professeur ferme la marche et vérifie que personne ne reste. Le point de rassemblement est obligatoire."],
["Manipuler une machine-outil sans autorisation du professeur est :","Possible si on sait déjà s'en servir grâce à YouTube","Strictement interdit et constitue une faute grave","Autorisé en fin de séance si on s'ennuie","Toléré si un camarade surveille",1,"Aucune machine ne doit être utilisée sans autorisation ET formation préalable par le professeur. C'est une faute grave pouvant entraîner l'exclusion immédiate et la responsabilité pénale en cas d'accident."],
["Les cheveux longs en atelier doivent être :","Laissés libres pour le style","Attachés ou protégés pour éviter tout happement","Coupés obligatoirement avant la rentrée","Couverts d'un bonnet de bain",1,"Les cheveux longs, écharpes, cordons de sweat, bijoux pendants = risque de happement par une machine tournante. Attachez vos cheveux, retirez tout ce qui pend. C'est vital."],
["Que signifie EPI ?","Espace de Protection Intérieure","Équipement de Protection Individuelle","Évaluation Pratique Individuelle","Enseignement Professionnel Intégré",1,"EPI = Équipement de Protection Individuelle. Chaussures de sécurité, lunettes, gants, casque anti-bruit, bleu de travail. Chaque activité a ses EPI spécifiques."],
["Sans votre tenue professionnelle en atelier :","Vous pouvez travailler quand même en faisant gaffe","Vous n'êtes pas autorisé à manipuler, votre séance est impactée","Vous empruntez celle d'un camarade plus petit","Vous recevez juste un rappel oral",1,"Pas de tenue = pas de manipulation. La séance est comptée mais vous ne pouvez pas pratiquer. Votre absence de tenue est notée et les retards de formation s'accumulent."],
["Pour protéger vos yeux en atelier (meulage, soudure, perçage) :","Vous plissez les yeux très fort","Vous portez les lunettes de protection fournies","Vous tournez la tête de l'autre côté","Vous demandez à un camarade de regarder à votre place",1,"Une projection de métal dans l'œil peut rendre aveugle. Les lunettes de protection sont OBLIGATOIRES pour toute opération générant des projections. Pas de lunettes = pas de travail."],
["Les bouchons d'oreilles ou le casque anti-bruit en atelier :","C'est pour les fragiles","Sont obligatoires quand le niveau sonore l'exige","Empêchent d'entendre le prof, donc inutiles","Sont réservés au prof parce qu'il est vieux",1,"L'exposition au bruit détruit l'audition de manière irréversible. Au-delà de 85 dB (meuleuse, perceuse à colonne), la protection auditive est obligatoire. Votre audition ne repousse pas."],
["Les gants de protection en atelier :","Sont toujours les mêmes pour tout","Sont adaptés au risque : coupure, chaleur, produit chimique","Sont facultatifs si on fait attention","Remplacent le lavage des mains",1,"Il existe des gants anti-coupure, des gants thermiques, des gants chimiques. Chaque risque = un type de gant. Utiliser le mauvais gant peut être pire que pas de gant du tout."],
["Le signal d'alarme incendie est :","Un sifflet du prof d'EPS","Un signal sonore continu reconnaissable par tous","Un message WhatsApp du CPE","Un cri dans le couloir",1,"Le signal est un son continu et puissant. Dès qu'il retentit, arrêtez tout, quittez l'atelier en laissant machines et outils en l'état, et évacuez vers le point de rassemblement."],
["Les extincteurs présents dans l'établissement :","Sont décoratifs, comme les plantes vertes","Sont réservés uniquement aux pompiers","Peuvent être utilisés sur un début d'incendie selon la formation reçue","Servent de cale-porte quand il fait chaud",2,"Vous serez formés à l'utilisation des extincteurs. Sur un départ de feu : tirez la goupille, testez, dirigez le jet à la base des flammes. Ne prenez jamais de risque : en cas de doute, évacuez."],
["Un objet tranchant (cutter, couteau) apporté sans raison professionnelle :","Est autorisé s'il reste bien au fond du sac","Est interdit et confisqué, avec sanctions disciplinaires","Est autorisé en atelier uniquement","Est toléré si c'est un petit canif",1,"Tout objet tranchant ou dangereux non lié à l'activité professionnelle est interdit. La confiscation est immédiate. Selon la gravité : exclusion temporaire ou conseil de discipline."],
["Les produits chimiques en atelier doivent être manipulés :","À mains nues si on fait vite","Avec les protections adaptées et selon les fiches de sécurité (FDS)","Librement par les élèves qui ont l'habitude","En fermant les yeux pour ne pas respirer les vapeurs",1,"Chaque produit chimique a une Fiche de Données de Sécurité (FDS). Elle indique les EPI nécessaires, les risques et les gestes d'urgence. Lisez les étiquettes. Portez les protections."],
["Courir dans les couloirs ou les escaliers est :","Normal, on est pressé entre deux cours","Interdit : c'est un comportement à risque","Autorisé si on est en retard","Un bon entraînement sportif gratuit",1,"Les chutes dans les escaliers sont la première cause d'accident dans les établissements scolaires. Marcher, tenir la rampe, ne pas pousser. C'est du bon sens."],
["Après avoir utilisé un outil en atelier, vous :","Le laissez sur l'établi, quelqu'un rangera","Le rangez à sa place, nettoyez votre poste de travail","Le mettez dans votre sac, souvenir","Le passez au camarade suivant sans vérifier",1,"Ranger son poste = respecter le matériel commun et préparer le travail du suivant. Un outil qui traîne = un risque de chute, de coupure, de dégradation. Le rangement fait partie du travail."],
["Votre poste de travail en atelier doit être :","Décoré à votre goût","Propre et rangé avant de le quitter","Laissé tel quel, c'est pas un hôtel","Nettoyé seulement le vendredi",1,"Le nettoyage du poste fait partie intégrante de la séance. Copeaux, huile, chutes de matériaux : tout doit être nettoyé. Un poste sale = un danger pour le suivant."],
["Une PFMP (stage en entreprise) est :","Des vacances déguisées loin du lycée","Un stage obligatoire faisant partie de la formation et du diplôme","Une option que l'on peut refuser si on n'a pas envie","Un stage où on fait le café",1,"Les PFMP sont obligatoires pour l'obtention du diplôme. Elles comptent dans la note finale (CCF). Ne pas faire ses stages = ne pas avoir son diplôme. C'est aussi simple que ça."],
["En stage (PFMP), vous êtes en retard. Vous :","Arrivez tranquillement, c'est pas le lycée","Prévenez immédiatement l'entreprise ET le lycée","Restez chez vous et vous direz que vous étiez malade","Envoyez un SMS à un collègue stagiaire",1,"En entreprise, un retard non signalé peut entraîner une rupture de stage. Prévenez votre tuteur ET le lycée dès que possible. Vous représentez le lycée Jacques Raynaud."],
["En stage, vous vous blessez. Vous :","Continuez sans rien dire pour ne pas embêter","Prévenez immédiatement votre tuteur et faites constater la blessure","Rentrez chez vous et envoyez un SMS demain","Vous soignez vous-même, c'est pas grave",1,"Tout accident en stage doit être déclaré immédiatement (déclaration d'accident du travail dans les 24h). Même une petite blessure. C'est une obligation légale qui vous protège."],
["L'absence à un CCF (Contrôle en Cours de Formation) sans justificatif médical :","N'a aucune conséquence, on repasse quand on veut","Entraîne la note zéro et peut compromettre le diplôme","Est compensée automatiquement par les autres notes","Se rattrape le week-end suivant",1,"Le CCF n'est pas un contrôle ordinaire : c'est une épreuve d'examen. Absence injustifiée = zéro. Il n'y a pas de session de rattrapage. C'est le diplôme qui est en jeu."],
["La trottinette ou le vélo dans l'enceinte :","Sont parfaits pour aller plus vite entre les bâtiments","Doivent être rangés au parking prévu, usage interdit dans l'enceinte","Sont autorisés dans la cour","Peuvent être garés devant la porte de l'atelier",1,"Trottinettes, vélos, skateboards : rangés au parking dès l'entrée. Rouler dans l'enceinte = danger pour les piétons et sanction disciplinaire."],
["En cas de blessure en atelier :","Vous continuez si ce n'est qu'une égratignure","Prévenez immédiatement le professeur, ne touchez pas la blessure","Allez seul à l'infirmerie sans prévenir personne","Demandez à un camarade de faire un pansement",1,"TOUTE blessure, même minime, doit être signalée au professeur. Il décide de la marche à suivre. Ne quittez jamais l'atelier seul. Ne touchez pas une blessure d'un camarade sans gants."],
["Le plan d'évacuation affiché dans chaque salle indique :","Le menu de la semaine à la cantine","Les itinéraires de sortie et points de rassemblement","Les horaires de bus","Le plan du quartier pour trouver un kebab",1,"Repérez le plan d'évacuation dans chaque salle où vous allez. Connaissez l'itinéraire ET le point de rassemblement. En cas d'urgence, c'est automatique, pas le moment de chercher."],
["Utiliser un outil sans vérifier son état avant :","Permet de gagner du temps","Met en danger votre sécurité et celle des autres","Montre que vous êtes autonome","Fait preuve d'initiative et de confiance",1,"Avant toute utilisation : vérifiez l'état de l'outil (câble, lame, mandrin, disque). Un outil défectueux doit être signalé et mis de côté. Utiliser un outil défectueux = accident garanti."],
["La posture professionnelle en entreprise et en atelier :","C'est écouter de la musique en travaillant","C'est ponctualité, respect des consignes, tenue adaptée, communication correcte","C'est travailler vite sans se soucier de la qualité","C'est discuter entre collègues toute la journée",1,"La posture professionnelle s'apprend au lycée et se vit en stage. Un employeur juge sur : la ponctualité, le sérieux, le respect, la communication, la propreté du poste. Ce sont vos futurs collègues."],
["Les pictogrammes de danger sur les produits chimiques :","Sont de la décoration sur les flacons","Indiquent les risques précis : inflammable, corrosif, toxique…","Sont réservés aux cours de chimie en lycée général","Sont juste pour faire peur",1,"Les pictogrammes SGH (losange rouge) sont universels. Apprenez à les lire : flamme, tête de mort, point d'exclamation, corrosion… Chacun indique un risque et des précautions spécifiques."],
["Quand vous portez des charges lourdes en atelier :","Vous les soulevez avec le dos bien courbé","Vous pliez les genoux, gardez le dos droit et demandez de l'aide si besoin","Vous les lancez à un camarade, c'est plus rapide","Vous les traînez par terre, c'est moins fatigant",1,"Les troubles musculosquelettiques sont la 1ère maladie professionnelle en France. Pliez les genoux, dos droit, charge proche du corps. Au-delà de 25 kg : demandez de l'aide ou utilisez un chariot."],
["Vous remarquez qu'un câble électrique est dénudé en atelier. Vous :","Le touchez pour vérifier s'il y a du courant","Le recouvrez avec du scotch, ça fera l'affaire","Signalez-le immédiatement au professeur sans y toucher","Le contournez et n'en parlez pas",2,"Un câble dénudé = risque d'électrocution mortelle. Signalez immédiatement. Ne touchez pas. Ne tentez pas de réparer. C'est le travail d'un professionnel habilité."],
["En stage, votre tuteur vous demande de faire quelque chose de dangereux sans EPI. Vous :","Obéissez, c'est lui le chef","Refusez poliment et expliquez que vous devez porter vos EPI","Faites semblant de ne pas entendre","Le faites vite fait, juste cette fois",1,"Vous avez le DROIT de refuser une tâche dangereuse, même en stage. Contactez votre professeur référent si la situation se reproduit. Votre sécurité n'est jamais négociable."],
["À la fin de la journée, vous quittez l'atelier. Vous :","Partez en courant dès que la sonnerie retentit","Rangez, nettoyez votre poste, vérifiez que tout est éteint, puis sortez calmement","Laissez tout en plan, le prof rangera demain","Emportez un outil pour vous entraîner chez vous",1,"Le rangement et le nettoyage de fin de séance font partie du temps d'atelier. Machines éteintes, outils rangés, poste propre, déchets triés. C'est la règle professionnelle."],
["Les équipements de protection en atelier (lunettes, gants, casque) :","Vous appartiennent : vous pouvez les personnaliser","Sont du matériel collectif à maintenir en bon état","Peuvent être échangés entre camarades sans nettoyage","Ne sont pas importants s'ils sont abîmés",1,"Les EPI collectifs doivent être maintenus en bon état. Signalez tout EPI endommagé. Un EPI abîmé ne protège plus. Ne partagez pas les protections individuelles (hygiène)."],
["Un camarade se blesse avec une meuleuse. Vous :","Prenez une vidéo pour montrer au prof ce qui s'est passé","Arrêtez la machine si possible, alertez le professeur immédiatement","Essayez de soigner la blessure vous-même","Continuez votre travail, le prof a vu",1,"Priorité 1 : couper la machine (bouton d'arrêt d'urgence). Priorité 2 : alerter le professeur. NE touchez PAS la blessure sans gants. NE déplacez PAS un blessé grave. Le prof gère les secours."],
["Le marquage au sol en atelier (zones jaunes, rouges) :","Est de la décoration pour faire joli","Délimite les zones de danger, de circulation et de travail","Indique les places de parking pour les scooters","Sert à jouer à la marelle pendant les pauses",1,"Le marquage au sol est normalisé. Jaune = circulation/attention. Rouge = danger/interdiction/arrêt d'urgence. Respectez ces zones. Elles existent aussi dans les entreprises où vous irez en stage."],
["Le bouton d'arrêt d'urgence (champignon rouge) sur une machine :","Est un gadget décoratif","Sert à éteindre la lumière de l'atelier","Arrête immédiatement la machine en cas de danger","Ne doit jamais être touché",2,"Le bouton « coup de poing » rouge arrête la machine instantanément. Repérez-le AVANT de commencer à travailler. En cas de danger : frappez-le sans hésiter. Il peut sauver une vie."],
["En atelier, les bijoux (bagues, chaînes, boucles d'oreilles pendantes) :","Donnent du style et sont autorisés","Doivent être retirés : risque de happement ou de brûlure","Sont autorisés s'ils sont petits","Sont obligatoires pour montrer sa personnalité",1,"Une bague happée par un tour peut arracher un doigt. Une chaîne peut être prise dans un engrenage. Retirez TOUS les bijoux avant d'entrer en zone de travail. Sans exception."],
["Le respect du matériel d'atelier (machines, outils, instruments de mesure) :","Ce n'est pas mon matériel, je m'en fiche","C'est essentiel : matériel endommagé = danger + coût pour tous","Le matériel se remplace facilement, pas grave","C'est la responsabilité du prof, pas la mienne",1,"Le matériel d'atelier coûte des milliers d'euros. Un outil mal rangé se détériore. Un instrument de mesure mal traité perd sa précision. Le respect du matériel = respect du métier et des collègues."]
]}
];

var S={sc:'welcome',el:{nom:'',prenom:'',classe:''},cp:null,cq:0,so:null,aw:false,scores:[null,null,null],att:[0,0,0],sig:null,eng:false,ans:[]};

function R(){
  var a=document.getElementById('app');
  switch(S.sc){
    case 'welcome':a.innerHTML=rW();break;
    case 'dashboard':a.innerHTML=rD();break;
    case 'quiz':a.innerHTML=rQ();break;
    case 'result':a.innerHTML=rR();break;
    case 'attestation':a.innerHTML=rA();initSig();break;
  }
}

function rW(){
  var opts='';
  CLASSES.forEach(function(g){
    opts+='<optgroup label="'+g.g+'">';
    g.c.forEach(function(c){opts+='<option value="'+c+'">'+c+'</option>';});
    opts+='</optgroup>';
  });
  return '<div class="card"><h2>Bienvenue au lycée Jacques Raynaud</h2>'+
  '<p>Tout élève entrant dans l\'établissement doit suivre <strong>trois parcours d\'accueil</strong> de prise de connaissance du cadre scolaire, éducatif et professionnel.</p>'+
  '<p class="mt12">Ces parcours permettent de vérifier que vous avez compris les règles essentielles relatives à la vie scolaire, au respect, à la sécurité et à la posture attendue en lycée professionnel.</p>'+
  '<div class="dv"></div><h3>Identification</h3>'+
  '<div class="fg"><label>Nom</label><input type="text" id="fnom" placeholder="Votre nom" autocomplete="family-name"></div>'+
  '<div class="fg"><label>Prénom</label><input type="text" id="fpre" placeholder="Votre prénom" autocomplete="given-name"></div>'+
  '<div class="fg"><label>Classe / Formation</label><select id="fcla"><option value="">— Sélectionnez —</option>'+opts+'</select></div>'+
  '<button class="btn btn-p btn-bk mt16" onclick="go()">Commencer les parcours</button>'+
  '<div class="rgpd"><strong>🔒 Protection des données</strong><br>Aucune donnée n\'est envoyée ni stockée sur un serveur. Tout reste dans votre navigateur et disparaît à la fermeture. Conformité RGPD.</div></div>';
}

function rD(){
  var e=S.el,all=S.scores.every(function(s,i){return s!==null&&s>=P[i].seuil;});
  var h='<div class="card"><h2>Parcours de '+e.prenom+' '+e.nom+'</h2>'+
  '<p style="color:#666;font-size:.9em">Classe : '+e.classe+'</p><div class="dv"></div><div class="pl">';
  P.forEach(function(p,i){
    var sc=S.scores[i],pass=sc!==null&&sc>=p.seuil,fail=sc!==null&&sc<p.seuil;
    var lk=i>0&&S.scores[i-1]===null;
    var cls=pass?'dn':fail?'fl':lk?'lk':'';
    var bg=pass?'<span class="pbg bg-o">✓ '+sc+'/'+p.q.length+'</span>':
            fail?'<span class="pbg bg-k">✗ '+sc+'/'+p.q.length+'</span>':
            lk?'<span class="pbg bg-l">🔒 Verrouillé</span>':
            '<span class="pbg bg-t">À faire</span>';
    h+='<div class="pi '+cls+'" onclick="'+(lk?'':'lQ('+i+')')+'">'+
    '<div class="pn">'+p.icon+'</div><div class="pinf"><h4>Parcours '+p.id+' — '+p.titre+'</h4>'+
    '<p>'+p.desc+' · '+p.duree+' · Seuil : '+p.seuil+'/'+p.q.length+'</p></div>'+bg+'</div>';
  });
  h+='</div>';
  if(all) h+='<div class="mt24 tc"><p style="font-size:1.1em;color:var(--vo);font-weight:600;margin-bottom:12px">✅ Tous les parcours sont validés !</p>'+
  '<button class="btn btn-s" onclick="gA()">Générer mon attestation</button></div>';
  return h+'</div>';
}

function rQ(){
  var p=P[S.cp],qi=S.cq,q=p.q[qi],t=p.q.length,pct=((qi+(S.aw?1:0))/t*100).toFixed(0);
  var h='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
  '<h2 style="border:none;padding:0;margin:0;font-size:1.05em">Parcours '+p.id+'</h2>'+
  '<span class="tg">Seuil : '+p.seuil+'/'+t+'</span></div>'+
  '<div class="pbw"><div class="pbf" style="width:'+pct+'%"></div></div>'+
  '<div class="qc">Question '+(qi+1)+' sur '+t+'</div>'+
  '<div class="qt">'+q[0]+'</div><div class="ol">';
  for(var i=1;i<=4;i++){
    var cls='';
    if(S.aw){if(i-1===q[5])cls='ok';else if(i-1===S.so&&i-1!==q[5])cls='ko';}
    else if(i-1===S.so)cls='sel';
    h+='<button class="ob '+cls+'" onclick="sO('+(i-1)+')" '+(S.aw?'disabled':'')+'>'+q[i]+'</button>';
  }
  h+='</div>';
  if(S.aw){
    h+='<div class="fb '+(S.so===q[5]?'fb-ok':'fb-ko')+'">'+
    (S.so===q[5]?'✅ Bonne réponse !':'❌ La bonne réponse était : « '+q[q[5]+1]+' »')+'</div>';
    if(q[6]) h+='<div style="margin-top:8px;padding:12px 16px;background:#F8FAFC;border-left:3px solid '+(S.so===q[5]?'var(--vt)':'var(--or)');border-radius:0 var(--r) var(--r) 0;font-size:.88em;line-height:1.6;color:var(--gt)"><strong>💡 Remédiation :</strong> '+q[6]+'</div>';
  }
  h+='<div class="mt16 g8">';
  if(!S.aw&&S.so!==null) h+='<button class="btn btn-p" onclick="vA()">Valider ma réponse</button>';
  if(S.aw) h+='<button class="btn btn-p" onclick="nQ()">'+(qi<t-1?'Question suivante →':'Voir mon résultat')+'</button>';
  h+='</div><div class="mt12 tc np"><button class="bs" onclick="gS(\'dashboard\')">← Tableau de bord</button></div></div>';
  return h;
}

function rR(){
  var pi=S.cp,p=P[pi],sc=S.scores[pi],t=p.q.length,pass=sc>=p.seuil;
  var h='<div class="card"><h2>Résultat — Parcours '+p.id+'</h2><div class="sd">'+
  '<div class="sb '+(pass?'sp':'sf')+'">'+sc+'/'+t+'</div>'+
  '<div class="sl">'+(pass?'✅ Validé (seuil : '+p.seuil+'/'+t+')':'❌ Seuil non atteint ('+p.seuil+'/'+t+' requis)')+'</div></div>';
  if(!pass) h+='<div style="background:var(--rc);padding:14px;border-radius:var(--r);margin:16px 0;text-align:center">'+
  '<p style="color:var(--rk);font-weight:600">Vous devez repasser ce parcours.</p>'+
  '<p style="color:#666;font-size:.9em;margin-top:4px">Relisez bien. Demandez de l\'aide à un professeur ou à la vie scolaire si nécessaire.</p></div>';
  h+='<div class="mt16 tc g8">';
  if(!pass) h+='<button class="btn btn-p" onclick="rQ2('+pi+')">Recommencer</button>';
  h+='<button class="btn btn-o" onclick="gS(\'dashboard\')">Tableau de bord</button></div></div>';
  return h;
}

function rA(){
  var e=S.el,td=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  var h='<div class="card" id="att-card"><h2>Attestation de parcours d\'accueil</h2>'+
  '<p><strong>'+e.prenom+' '+e.nom+'</strong> — '+e.classe+'</p><div class="dv"></div>'+
  '<p style="margin-bottom:12px">Je reconnais avoir suivi les trois parcours d\'accueil :</p>'+
  '<table style="width:100%;border-collapse:collapse;margin-bottom:16px">'+
  '<tr style="background:var(--bp)"><th style="padding:8px;text-align:left;border:1px solid #ddd">Parcours</th>'+
  '<th style="padding:8px;text-align:center;border:1px solid #ddd">Score</th>'+
  '<th style="padding:8px;text-align:center;border:1px solid #ddd">Statut</th></tr>';
  P.forEach(function(p,i){
    h+='<tr><td style="padding:8px;border:1px solid #ddd">'+p.id+'. '+p.titre+'</td>'+
    '<td style="padding:8px;text-align:center;border:1px solid #ddd;font-weight:600">'+S.scores[i]+'/'+p.q.length+'</td>'+
    '<td style="padding:8px;text-align:center;border:1px solid #ddd;color:var(--vo)">✓ Validé</td></tr>';
  });
  h+='</table><div class="cbg" onclick="tE()"><input type="checkbox" id="cbe" '+(S.eng?'checked':'')+'>'+
  '<label for="cbe">Je reconnais avoir été informé(e) des règles essentielles de vie scolaire, de respect, de sécurité, d\'usage du numérique, de comportement en atelier et de posture professionnelle attendue au lycée Jacques Raynaud. Je comprends que ces règles s\'appliquent dans l\'établissement, en sortie, en PFMP, en atelier et dans toute situation liée à ma qualité d\'élève.</label></div>'+
  '<h3>Signature de l\'élève</h3><p style="font-size:.85em;color:#888">Signez avec votre doigt ou votre souris dans le cadre ci-dessous.</p>'+
  '<div class="sz"><canvas id="sc" width="500" height="150"></canvas><div class="sa"><button class="bs" onclick="cS()">Effacer</button></div></div>'+
  '<p style="text-align:right;color:#888;font-size:.9em">Fait à Marseille, le '+td+'</p>'+
  '<div class="mt16 g8"><button class="btn btn-pr" onclick="pA()" '+(S.eng?'':'disabled')+'>🖨 Imprimer l\'attestation</button>'+
  '<button class="btn btn-o" onclick="gS(\'dashboard\')">← Retour</button></div>'+
  '<div class="rgpd"><strong>🔒 Rappel</strong> — Document généré localement. Aucune donnée transmise. Imprimez-le et remettez-le à la vie scolaire.</div></div>';
  return h;
}

// ACTIONS
function go(){
  var n=document.getElementById('fnom').value.trim(),p=document.getElementById('fpre').value.trim(),c=document.getElementById('fcla').value;
  if(!n||!p||!c){alert('Merci de remplir tous les champs.');return;}
  S.el={nom:n,prenom:p,classe:c};gS('dashboard');
}
function lQ(i){if(i>0&&S.scores[i-1]===null)return;S.cp=i;S.cq=0;S.so=null;S.aw=false;S.ans=[];gS('quiz');}
function rQ2(i){S.scores[i]=null;lQ(i);}
function sO(i){if(S.aw)return;S.so=i;R();}
function vA(){if(S.so===null)return;S.aw=true;var q=P[S.cp].q[S.cq];S.ans.push(S.so===q[5]?1:0);R();}
function nQ(){
  var p=P[S.cp];
  if(S.cq<p.q.length-1){S.cq++;S.so=null;S.aw=false;R();window.scrollTo(0,0);}
  else{S.scores[S.cp]=S.ans.reduce(function(a,b){return a+b;},0);S.att[S.cp]++;gS('result');}
}
function gA(){S.eng=false;S.sig=null;gS('attestation');}
function tE(){S.eng=!S.eng;var cb=document.getElementById('cbe');if(cb)cb.checked=S.eng;var b=document.querySelector('.btn-pr');if(b)b.disabled=!S.eng;}
function gS(s){S.sc=s;R();window.scrollTo(0,0);}

// SIGNATURE
var sC,sX,sD=false;
function initSig(){
  sC=document.getElementById('sc');if(!sC)return;
  sX=sC.getContext('2d');
  var w=Math.min(500,sC.parentElement.clientWidth-20);
  sC.width=w;sC.height=Math.round(w*.3);
  sX.strokeStyle='#1b3a63';sX.lineWidth=2;sX.lineCap='round';sX.lineJoin='round';
  function gP(e){var r=sC.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  function sd(e){sD=true;var p=gP(e);sX.beginPath();sX.moveTo(p.x,p.y);e.preventDefault();}
  function dr(e){if(!sD)return;var p=gP(e);sX.lineTo(p.x,p.y);sX.stroke();e.preventDefault();}
  function ed(){sD=false;S.sig=sC.toDataURL();}
  sC.addEventListener('mousedown',sd);sC.addEventListener('mousemove',dr);sC.addEventListener('mouseup',ed);sC.addEventListener('mouseleave',ed);
  sC.addEventListener('touchstart',sd,{passive:false});sC.addEventListener('touchmove',dr,{passive:false});sC.addEventListener('touchend',ed);
}
function cS(){if(sC&&sX){sX.clearRect(0,0,sC.width,sC.height);S.sig=null;}}

// PRINT
function pA(){
  if(!S.eng){alert("Cochez l'engagement d'abord.");return;}
  var e=S.el,td=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  var si=S.sig?'<img src="'+S.sig+'" class="psi" alt="Signature">':'<p style="margin-top:40px;border-top:1px solid #000;width:200px;margin-left:auto;margin-right:auto">&nbsp;</p>';
  var y=new Date().getFullYear();
  var h='<div class="ph">'+
  '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 480 95" style="display:block;margin:0 auto">'+
  '<text fill="#1b3a63" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="17px" font-weight="800" x="0" y="20">LYCÉE PROFESSIONNEL PRIVÉ</text>'+
  '<text fill="#1b3a63" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="24px" font-weight="800" x="0" y="48">JACQUES RAYNAUD</text>'+
  '<text fill="#666" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="10px" x="0" y="64">59 Trav. Charles Susini – 13013 Marseille</text>'+
  '</svg>'+
  '</div>'+
  '<div class="pb"><h2>Attestation de parcours d\'accueil<br><small style="font-size:.7em;letter-spacing:0;text-transform:none;font-weight:normal;font-style:italic">Règles de vie, sécurité et citoyenneté</small></h2>'+
  '<p><strong>Élève :</strong> '+e.prenom+' '+e.nom+'<br><strong>Classe :</strong> '+e.classe+'<br><strong>Année scolaire :</strong> '+y+'-'+(y+1)+'</p>'+
  '<p style="margin-top:16px">Je reconnais avoir suivi les trois parcours d\'accueil :</p>'+
  '<table class="ps"><tr><th style="width:8%">N°</th><th>Parcours</th><th style="width:14%">Score</th><th style="width:14%">Seuil</th><th style="width:10%">Statut</th></tr>';
  P.forEach(function(p,i){
    h+='<tr><td style="text-align:center;font-weight:600">'+p.id+'</td><td>'+p.titre+'</td>'+
    '<td style="text-align:center;font-weight:600">'+S.scores[i]+' / '+p.q.length+'</td>'+
    '<td style="text-align:center">'+p.seuil+' / '+p.q.length+'</td>'+
    '<td style="text-align:center;color:green;font-weight:600">✓</td></tr>';
  });
  h+='</table><div class="pe"><p>Je reconnais avoir été informé(e) des règles essentielles de vie scolaire, de respect, de sécurité, d\'usage du numérique, de comportement en atelier et de posture professionnelle attendue au lycée Jacques Raynaud.</p>'+
  '<p>Je comprends que ces règles s\'appliquent à moi dans l\'établissement, en sortie, en PFMP, en atelier et dans toute situation liée à ma qualité d\'élève.</p></div>'+
  '<div class="psa"><div class="psb"><p>Fait à Marseille, le '+td+'</p></div><div class="psb"><p>Signature de l\'élève</p>'+si+'</div></div>'+
  '<div style="margin-top:40px;padding-top:12px;border-top:1px solid #ccc;font-size:9pt;color:#888;text-align:center">'+
  'LP Privé Jacques Raynaud — Campus ÉQUATIO — Marseille<br>Document généré le '+td+' — Parcours d\'accueil</div></div>';
  var pz=document.getElementById('pz');pz.innerHTML=h;pz.classList.remove('hid');
  setTimeout(function(){window.print();},200);
  setTimeout(function(){pz.classList.add('hid');},1000);
}

// QR CODE
function showQR(){
  var u=window.location.href,s=200;
  var q='https://api.qrserver.com/v1/create-qr-code/?size='+s+'x'+s+'&data='+encodeURIComponent(u);
  var o=document.createElement('div');
  o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000';
  o.innerHTML='<div style="background:#fff;border-radius:12px;padding:32px;text-align:center;max-width:340px">'+
  '<h3 style="color:#1b3a63;margin-bottom:12px">QR Code de distribution</h3>'+
  '<p style="font-size:.85em;color:#666;margin-bottom:16px">Scannez pour accéder aux parcours d\'accueil.</p>'+
  '<img src="'+q+'" alt="QR" style="width:'+s+'px;height:'+s+'px;border:1px solid #eee;border-radius:4px">'+
  '<p style="font-size:.7em;color:#999;margin-top:12px;word-break:break-all">'+u+'</p>'+
  '<button onclick="this.parentElement.parentElement.remove()" style="margin-top:16px;padding:8px 24px;background:#1b3a63;color:#fff;border:none;border-radius:6px;cursor:pointer">Fermer</button></div>';
  o.addEventListener('click',function(e){if(e.target===o)o.remove();});
  document.body.appendChild(o);
}

R();
</script>
</body>
</html>
