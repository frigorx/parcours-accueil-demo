<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Parcours d'accueil — Lycée Professionnel — Maquette de démonstration</title>
<style>
:root{--bi:#1b3a63;--bv:#2563eb;--bc:#3b82f6;--bp:#EFF3FB;--or:#ff6b35;--ov:#ff5722;--oc:#FFF4ED;--cy:#06b6d4;--cc:#22d3ee;--cl:#E0F7FA;--vt:#10b981;--vc:#ECFDF5;--vi:#8b5cf6;--vc2:#F3F0FF;--ja:#fbbf24;--rk:#ef4444;--rc:#FEF2F2;--gt:#1e293b;--gtl:#64748b;--gc:#f0f4f8;--w:#fff;--r:12px;--sh:0 4px 20px rgba(27,58,99,.12);--shh:0 8px 40px rgba(27,58,99,.18);--sho:0 4px 20px rgba(255,107,53,.25);--ft:'Fredoka','Nunito',sans-serif;--fc:'Nunito','Segoe UI',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fc);font-size:16px;line-height:1.6;color:var(--gt);background:var(--gc);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1b3a63 0%,#2563eb 50%,#06b6d4 100%);color:var(--w);padding:18px 20px 14px;text-align:center}
.hdr-logos{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.hdr-logos svg{max-width:100%;height:auto}
.hdr-sep{width:1px;height:46px;background:rgba(255,255,255,.25);flex-shrink:0}
.hdr-sub{font-family:var(--fc);font-size:.92em;font-style:italic;opacity:.8;margin-top:8px}
.hdr-bar{height:5px;background:linear-gradient(90deg,var(--or),var(--ja),var(--vt),var(--cy),var(--bv),var(--vi))}
.ctn{max-width:800px;margin:0 auto;padding:24px 16px}
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);padding:28px 24px;margin-bottom:20px;border:1px solid rgba(27,58,99,.06);transition:box-shadow .3s,transform .3s;animation:fadeUp .4s ease both}
.card:hover{box-shadow:var(--shh)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card h2{font-family:var(--ft);color:var(--bi);font-size:1.3em;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:3px solid var(--cy)}
.card h3{color:var(--bc);font-size:1.05em;margin:16px 0 8px}
.fg{margin-bottom:16px}
.fg label{display:block;font-weight:600;color:var(--bi);margin-bottom:4px;font-size:.9em}
.fg input,.fg select{width:100%;padding:10px 14px;border:2px solid var(--bp);border-radius:var(--r);font-size:1em;font-family:var(--fc);transition:border-color .2s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--bc);box-shadow:0 0 0 3px rgba(44,74,124,.1)}
.btn{display:inline-block;padding:14px 32px;border:none;border-radius:var(--r);font-family:var(--fc);font-size:1em;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.btn-p{background:var(--bv);color:var(--w)}.btn-p:hover{background:var(--bc);box-shadow:0 4px 16px rgba(37,99,235,.35)}.btn-p:disabled{background:#999;cursor:not-allowed}
.btn-s{background:var(--vt);color:var(--w)}.btn-s:hover{background:#059669;box-shadow:0 4px 16px rgba(16,185,129,.35)}
.btn-o{background:transparent;color:var(--bv);border:2px solid var(--bv)}.btn-o:hover{background:var(--bp);border-color:var(--bc)}
.btn-pr{background:var(--or);color:var(--w)}.btn-pr:hover{background:var(--ov);box-shadow:var(--sho)}
.btn-bk{display:block;width:100%}
.pl{display:flex;flex-direction:column;gap:12px}
.pi{display:flex;align-items:center;gap:16px;padding:16px 18px;border:2px solid var(--bp);border-radius:var(--r);transition:all .25s;cursor:pointer}
.pi:hover{border-color:var(--cy);background:var(--cl);transform:translateY(-2px);box-shadow:var(--sh)}
.pi.lk{opacity:.5;cursor:not-allowed}.pi.lk:hover{border-color:var(--bp);background:var(--w)}
.pi.dn{border-color:var(--vt);background:var(--vc)}
.pi.fl{border-color:var(--rk);background:var(--rc)}
.pn{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--bv),var(--cy));color:var(--w);display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-size:1.3em;font-weight:700;flex-shrink:0}
.pi.dn .pn{background:linear-gradient(135deg,var(--vt),#34d399)}.pi.fl .pn{background:linear-gradient(135deg,var(--rk),#f87171)}
.pinf{flex:1}.pinf h4{color:var(--bi);margin-bottom:2px}.pinf p{font-size:.85em;color:#666}
.pbg{font-size:.8em;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.bg-t{background:#DBEAFE;color:var(--bv)}.bg-o{background:var(--vc);color:#065F46}.bg-k{background:var(--rc);color:#991B1B}.bg-l{background:#eee;color:#999}
.pbw{background:var(--bp);border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
.pbf{height:100%;background:linear-gradient(90deg,var(--cy),var(--bv),var(--or));border-radius:20px;transition:width .4s ease}
.qc{text-align:center;font-size:.85em;color:#888;margin-bottom:12px}
.qt{font-size:1.15em;font-weight:700;color:var(--gt);margin-bottom:20px;line-height:1.5}
.ol{display:flex;flex-direction:column;gap:10px}
.ob{display:block;width:100%;text-align:left;padding:14px 18px;border:2px solid var(--bp);border-radius:var(--r);background:var(--w);font-family:var(--fc);font-size:.95em;color:var(--gt);cursor:pointer;transition:all .2s;line-height:1.4}
.ob:hover{border-color:var(--cy);background:var(--cl)}
.ob.sel{border-color:var(--bv);background:#EFF6FF;font-weight:700;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.ob.ok{border-color:var(--vt);background:var(--vc)}.ob.ko{border-color:var(--rk);background:var(--rc)}
.fb{margin-top:12px;padding:12px 16px;border-radius:var(--r);font-size:.9em;line-height:1.5}
.fb-ok{background:var(--vc);color:#065F46}.fb-ko{background:var(--rc);color:#991B1B}
.sd{text-align:center;padding:24px}
.sb{font-family:var(--ft);font-size:3.5em;font-weight:700;line-height:1;margin-bottom:8px}
.sp{color:var(--vt)}.sf{color:var(--rk)}
.sl{font-size:1.1em;color:#666}
.sz{border:2px dashed var(--cy);border-radius:var(--r);padding:8px;margin:16px 0;text-align:center}
.sz canvas{border:1px solid #ddd;border-radius:4px;cursor:crosshair;touch-action:none;max-width:100%}
.sa{margin-top:8px;display:flex;gap:8px;justify-content:center}
.bs{padding:6px 14px;font-size:.85em;border:1px solid #ccc;border-radius:4px;background:var(--w);cursor:pointer}
.bs:hover{background:#f0f0f0}
.cbg{display:flex;align-items:flex-start;gap:10px;padding:14px;background:var(--oc);border-radius:var(--r);border-left:4px solid var(--or);margin:12px 0;cursor:pointer}
.cbg input[type=checkbox]{margin-top:3px;width:18px;height:18px;flex-shrink:0;accent-color:var(--bv)}
.cbg label{font-size:.95em;line-height:1.5;cursor:pointer}
.rgpd{background:var(--bp);border-radius:var(--r);padding:14px 18px;font-size:.8em;color:var(--bc);margin-top:16px;line-height:1.6}
.rgpd strong{color:var(--bi)}
.tc{text-align:center}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.g8{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hid{display:none!important}
.dv{height:1px;background:var(--bp);margin:20px 0}
.tg{display:inline-block;background:var(--vc2);color:var(--vi);padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:600}
.adm{position:fixed;bottom:16px;right:16px;z-index:100}
@media print{
  body{background:#fff;font-size:11pt}
  .hdr,.hdr-bar,.np,.adm,.rgpd{display:none!important}
  .ctn{max-width:100%;padding:0;margin:0}.card{box-shadow:none;border:none;padding:0}
  .pa{display:block!important;page-break-inside:avoid;padding:20px 30px}
  .ph{text-align:center;border-bottom:3px double #1b3a63;padding-bottom:16px;margin-bottom:20px}
  .ph svg{margin:0 auto 6px;display:block}
  .ph .phs{font-size:9pt;color:#666;margin-top:4px}
  .pb{font-size:11pt;line-height:1.6}
  .pb h2{font-family:Georgia,serif;font-size:14pt;color:#1b3a63;text-align:center;margin:20px 0 16px;text-transform:uppercase;letter-spacing:1px}
  .ps{width:100%;border-collapse:collapse;margin:16px 0}
  .ps th,.ps td{border:1px solid #ccc;padding:8px 12px;text-align:left}
  .ps th{background:#e8edf4;color:#1b3a63;font-weight:600}
  .pe{border:1px solid #ccc;padding:16px;margin:16px 0;line-height:1.8}
  .psa{display:flex;justify-content:space-between;margin-top:30px;gap:40px}
  .psb{flex:1;text-align:center}.psb p{margin-bottom:8px;font-weight:600}
  .psi{max-height:80px;margin-top:4px}
  #att-card{display:none}
}
@media(max-width:600px){
  .hdr{padding:12px 12px 10px}.hdr-logos{gap:10px}.hdr-sep{height:32px}
  .ctn{padding:12px 10px}.card{padding:20px 16px}.pi{flex-wrap:wrap}.sb{font-size:2.5em}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logos">
    <svg xmlns="http://www.w3.org/2000/svg" width="280" height="60" viewBox="0 0 320 75">
      <text fill="#fff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="19px" font-weight="800" x="0" y="22">PARCOURS D'ACCUEIL</text>
      <text fill="#fff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="25px" font-weight="800" x="0" y="52">LYCÉE PROFESSIONNEL</text>
      <text fill="rgba(255,255,255,.55)" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="10px" x="0" y="68">Maquette de démonstration</text>
    </svg>
    </div>
  <div class="hdr-sub">Parcours d'accueil</div>
</div>
<div class="hdr-bar"></div>
<div class="ctn" id="app"></div>
<div class="pa hid" id="pz"></div>
<div class="adm np"><button class="bs" onclick="showQR()" title="QR Code">📱 QR</button></div>

["Au lycée professionnel, la ponctualité est :","Optionnelle si on prévient","Importante uniquement pour les contrôles","Une obligation quotidienne, comme en entreprise","Laissée à l'appréciation du professeur",2],
["Un élève en retard sans justificatif :","Peut entrer sans conséquence","Sera exclu du cours","S'expose à des sanctions progressives","Doit juste prévenir un camarade",2],

["Le téléphone portable au lycée :","Est autorisé en permanence","Est interdit sauf aux récréations dans les zones autorisées","Peut être utilisé en cours pour la musique","Est confisqué dès l'entrée",1],

["L'atelier est un lieu :","De détente entre les cours","D'apprentissage professionnel avec des règles de sécurité strictes","Où l'on peut faire ce que l'on veut","Accessible uniquement en terminale",1],
["Les règles du lycée pro existent pour :","Ennuyer les élèves","Remplacer celles du collège","Préparer aux exigences du monde professionnel","Punir les élèves",2],
["Un élève inscrit s'engage à :","Venir quand il en a envie","Respecter le règlement intérieur et les consignes de sécurité","Ne suivre que les cours qui l'intéressent","Décider de ses horaires",1],
["Mâcher un chewing-gum en cours est :","Autorisé si on est discret","Interdit","Autorisé en atelier seulement","Autorisé par tous les professeurs",1],
["École Directe sert à :","Communiquer avec ses amis","Assurer le lien entre l'établissement, l'élève et la famille","Stocker ses photos","Rien d'important",1],

{id:2,titre:"Règles de vie et règlement intérieur",desc:"Connaître le cadre quotidien",duree:"25-30 min",seuil:23,icon:"📋",q:[
["Des retards injustifiés répétés entraînent :","Un simple rappel oral","Des sanctions progressives incluant des retenues","L'exclusion immédiate","Une discussion informelle",1],
["Pour justifier une absence, le responsable légal doit :","Envoyer un message sur les réseaux","Fournir un justificatif via École Directe ou le carnet dans les 48h","Ne rien faire","Demander à un autre parent",1],
["École Directe est :","Un jeu vidéo éducatif","Le logiciel officiel de suivi scolaire","Un réseau social pour élèves","Une application optionnelle",1],
["La casquette ou capuche est autorisée :","Partout","Uniquement dans la cour selon les consignes","En cours si le prof est d'accord","Nulle part",1],
["Manger ou boire (hors eau) en classe est :","Autorisé si on est discret","Interdit","Autorisé le matin","Laissé à la discrétion de l'élève",1],
["Le cyberharcèlement est :","Une blague entre élèves","Un délit puni par la loi avec sanctions scolaires et judiciaires","Toléré sur les réseaux sociaux","Un problème hors établissement",1],
["Filmer quelqu'un sans son accord est :","Normal","Interdit : atteinte au droit à l'image","Autorisé si on ne publie pas","Autorisé entre amis",1],
["La laïcité au lycée signifie :","Toutes les religions sont interdites","L'école est un espace neutre, chacun respecte les convictions des autres","On ne peut pas parler de religion","Une seule religion est acceptée",1],
["Les sanctions sont :","Décidées au hasard","Proportionnées et respectent une procédure","Toujours identiques","Choisies par les élèves",1],
["Dégrader du matériel scolaire ou des locaux :","Aucun risque si pas vu","Engage la responsabilité financière des responsables légaux (remboursement) et entraîne des sanctions disciplinaires","C'est un accident sans conséquence","Simple privation de récréation",1],
["La violence verbale est :","Acceptée pour rire","Strictement interdite et sanctionnée","Tolérée dans la cour","Un défaut de jeunesse",1],
["Un témoin de harcèlement doit :","Ne rien faire","En parler à un adulte de confiance (CPE, professeur, infirmier)","Filmer et publier","Régler ça lui-même",1],

["Un élève a le droit de :","Refuser un cours","S'exprimer dans le respect des règles et des personnes","Insulter un prof injuste","Quitter l'établissement quand il veut",1],
["Le vol ou le racket dans l'établissement :","Affaire entre élèves","Délits entraînant sanctions disciplinaires et poursuites judiciaires","Punis seulement si un adulte voit","Tolérés pour petits objets",1],
["Fumer ou vapoter (cigarette, e-cigarette, puff, vapoteuse) est :","Autorisé uniquement dans la cour","Strictement interdit dans toute l'enceinte de l'établissement, cour comprise","Toléré pour les majeurs","Autorisé hors des bâtiments",1],
["Introduire alcool ou stupéfiants :","Toléré en petite quantité","Interdit, faute grave, sanctions disciplinaires et poursuites","Ne concerne que les majeurs","Puni que si pris sur le fait",1],
["L'assurance scolaire est :","Inutile","Fortement recommandée, voire obligatoire pour certaines activités","Uniquement pour les sorties","Payée par l'établissement",1],
["Les sorties pendant les cours :","Libres pour tous","Encadrées par le règlement, nécessitent une autorisation","Possibles si un ami accompagne","Ne concernent que les internes",1],
["Le respect entre élèves signifie :","Être poli devant les adultes","Accepter les différences, ne pas discriminer, ne pas harceler","Être d'accord avec tout le monde","Ignorer les autres",1],
["L'espace restauration du lycée est :","Une cantine traditionnelle avec service","Un espace où les élèves apportent leur repas (gamelle) et sont responsables de leur place","Réservé aux internes uniquement","Géré par un prestataire extérieur",1],
["Après mon repas dans l'espace restauration, je dois :","Laisser ma place comme elle est, le personnel s'en occupe","Nettoyer ma place, débarrasser, trier et jeter mes déchets dans les bonnes poubelles","Attendre qu'un camarade nettoie à ma place","Faire comme bon me semble",1],
["L'absentéisme répété et non justifié d'un élève peut entraîner pour la famille :","Aucune conséquence légale","Une amende pénale et un signalement au procureur de la République","Un simple rappel téléphonique","Une lettre d'information sans suite",1],
["Faire des remarques déplacées sur le physique, la tenue ou le genre d'un autre élève :","Compliment ou plaisanterie sans gravité","Harcèlement sexiste : strictement interdit, sanctions disciplinaires et poursuites pénales possibles","Affaire privée entre élèves","Toléré entre amis",1],
["Publier des contenus dégradants sur un professeur ou un élève (réseaux sociaux, messagerie, vidéo) :","Liberté d'expression, aucun risque","Cyberharcèlement : délit pénal, sanctions disciplinaires lourdes, même hors temps scolaire","Acceptable si compte privé","Pas grave si effacé rapidement",1]

function lQ(i){if(i>0&&S.scores[i-1]===null)return;S.cp=i;S.cq=0;S.so=null;S.aw=false;S.ans=[];gS('quiz');}
function rQ2(i){S.scores[i]=null;lQ(i);}
function sO(i){if(S.aw)return;S.so=i;R();}
function vA(){if(S.so===null)return;S.aw=true;var q=P[S.cp].q[S.cq];S.ans.push(S.so===q[5]?1:0);R();}
function nQ(){
  var p=P[S.cp];
  if(S.cq<p.q.length-1){S.cq++;S.so=null;S.aw=false;R();window.scrollTo(0,0);}
  else{S.scores[S.cp]=S.ans.reduce(function(a,b){return a+b;},0);S.att[S.cp]++;gS('result');}
}
function gA(){S.eng=false;S.sig=null;S.sigp=null;S.mn=true;S.ref=gRef();gS('attestation');}
function gRef(){var d=new Date(),p=function(n){return n<10?'0'+n:n;};var dt=d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());var h=0,s=(S.el.nom+S.el.prenom+S.el.classe);for(var i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}var x=Math.abs(h).toString(36).toUpperCase();while(x.length<4)x='0'+x;return 'RI-'+dt+'-'+x.slice(0,4);}
function gPct(){var s=0,t=0;P.forEach(function(p,i){s+=(S.scores[i]||0);t+=p.q.length;});return t?Math.round(s/t*100):0;}
function tM(){S.mn=!S.mn;R();}
function tE(){S.eng=!S.eng;var cb=document.getElementById('cbe');if(cb)cb.checked=S.eng;var b=document.querySelector('.btn-pr');if(b)b.disabled=!S.eng;}
function gS(s){S.sc=s;R();window.scrollTo(0,0);}

// SIGNATURE (deux canvas : eleve + responsable legal)
function initSig(){bindCanvas('sc','sig');if(S.mn)bindCanvas('scp','sigp');}
function bindCanvas(id,prop){
  var c=document.getElementById(id);if(!c)return;
  var x=c.getContext('2d');
  var w=Math.min(500,c.parentElement.clientWidth-20);
  c.width=w;c.height=Math.round(w*.3);
  x.strokeStyle='#1b3a63';x.lineWidth=2;x.lineCap='round';x.lineJoin='round';
  var drawing=false;
  function gP(e){var r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  function sd(e){drawing=true;var p=gP(e);x.beginPath();x.moveTo(p.x,p.y);e.preventDefault();}
  function dx(e){if(!drawing)return;var p=gP(e);x.lineTo(p.x,p.y);x.stroke();e.preventDefault();}
  function ed(){drawing=false;S[prop]=c.toDataURL();}
  c.addEventListener('mousedown',sd);c.addEventListener('mousemove',dx);c.addEventListener('mouseup',ed);c.addEventListener('mouseleave',ed);
  c.addEventListener('touchstart',sd,{passive:false});c.addEventListener('touchmove',dx,{passive:false});c.addEventListener('touchend',ed);
}
function cS(){var c=document.getElementById('sc');if(c){c.getContext('2d').clearRect(0,0,c.width,c.height);S.sig=null;}}
function cSP(){var c=document.getElementById('scp');if(c){c.getContext('2d').clearRect(0,0,c.width,c.height);S.sigp=null;}}

// QR CODE - generation 100% locale, aucun appel reseau (RGPD-safe)
